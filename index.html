<!DOCTYPE html>
<html>
<head>
  <title>Tienda</title>
</head>
<body>

<h1>Mi tienda</h1>

<button onclick="login()">Iniciar sesión</button>
<button onclick="logout()">Cerrar sesión</button>

<h2>Productos</h2>

<button onclick="agregar('Camiseta', 10000)">Camiseta</button>
<button onclick="agregar('Pantalon', 20000)">Pantalón</button>
<button onclick="agregar('Accesorio', 5000)">Accesorio</button>

<h2>Carrito</h2>
<h2>Finalizar compra</h2>

<form onsubmit="comprar(event)">
  <input type="text" id="nombre" placeholder="Nombre completo" required><br><br>
  <input type="text" id="direccion" placeholder="Dirección" required><br><br>
  <input type="email" id="correo" placeholder="Correo" required><br><br>
  <input type="text" id="telefono" placeholder="Teléfono" required><br><br>

  <button type="submit">Comprar</button>
</form>

<p id="mensaje"></p>
<ul id="carrito"></ul>
<p id="total"></p>

<script src="app.js"></script>

</body>
</html>
